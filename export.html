    function renderMessages() {
      const container = document.getElementById("messages");

      const intro = el("div", { class: "channel-intro" });
      const ch = exportData.channel;
      const h2 = el("h2");
      h2.textContent = ch.type === 1 ? "Direct Messages" : `#${ch.name}`;
      const p = el("p");
      p.textContent =
        ch.type === 1
          ? "This is the beginning of your direct message history."
          : `This is the beginning of the exported history for #${ch.name}.`;
      intro.appendChild(h2);
      intro.appendChild(p);
      container.appendChild(intro);

      if (!exportData.messages.length) {
        const empty = el("div", { class: "empty-state" });
        const em = el("div", { class: "emoji" });
        em.textContent = "🗒️";
        const et = el("div", {
          style: { fontSize: "16px", fontWeight: "600", color: "#f2f3f5" },
        });
        et.textContent = "No messages in export";
        empty.appendChild(em);
        empty.appendChild(et);
        container.appendChild(empty);
        return;
      }

      const items = [];
      let lastDate = null;
      for (const msg of exportData.messages) {
        const d = new Date(msg.created_at);
        if (!isNaN(d.getTime())) {
          const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
          if (key !== lastDate) {
            items.push({ type: "divider", date: d });
            lastDate = key;
          }
        }
        items.push({ type: "message", message: msg });
      }

      for (let idx = 0; idx < items.length; idx++) {
        const item = items[idx];

        if (item.type === "divider") {
          const div = el("div", { class: "date-divider" });
          div.appendChild(el("div", { class: "date-divider-line" }));
          const txt = el("span", { class: "date-divider-text" });
          txt.textContent = item.date.toLocaleDateString(undefined, {
            month: "long",
            day: "numeric",
            year: "numeric",
          });
          div.appendChild(txt);
          div.appendChild(el("div", { class: "date-divider-line" }));
          container.appendChild(div);
          continue;
        }

        const msg = item.message;

        if (
          !msg.content &&
          !msg.sticker_id &&
          !msg.data.attachments.length &&
          !msg.data.embeds.length &&
          !msg.data.components.length
        )
          continue;

        let prevMsg, nextMsg;
        for (let j = idx - 1; j >= 0; j--) {
          if (items[j].type === "divider") break;
          prevMsg = items[j].message;
          break;
        }
        for (let j = idx + 1; j < items.length; j++) {
          if (items[j].type === "divider") break;
          nextMsg = items[j].message;
          break;
        }
        const grouped = canGroupWith(msg, prevMsg);

        const user = findUser(msg.user_id);
        const avatarUrl = getUserAvatarUrl(msg.user_id);

        if (msg.reply_to) {
          const replyMsg =
            exportData.messages.find((m) => m.id === msg.reply_to) ?? null;
          const replyUser = replyMsg ? findUser(replyMsg.user_id) : null;
          const replyAvatarUrl = replyUser
            ? getUserAvatarUrl(replyUser.id)
            : null;

          const bar = el("div", { class: "reply-bar" });
          bar.appendChild(el("div", { class: "reply-curve" }));
          if (replyAvatarUrl) {
            const img = el("img", {
              class: "reply-avatar",
              src: replyAvatarUrl,
              crossorigin: "anonymous",
            });
            img.onerror = () =>
              (img.src = getDefaultAvatar(replyUser?.id ?? "0"));
            bar.appendChild(img);
          }
          const uname = el("span", {
            class: "reply-username",
            style: {
              color: replyUser ? getAvatarColor(replyUser.id) : "#949ba4",
            },
          });
          uname.textContent = replyUser?.username ?? "Unknown User";
          bar.appendChild(uname);
          const preview = el("span", { class: "reply-content" });
          if (replyMsg?.content) {
            preview.appendChild(parseReplyContent(replyMsg.content));
          } else if (replyMsg?.sticker_id) {
            preview.textContent = "Sticker";
          } else if (replyMsg?.data.attachments.length) {
            const as = findAsset(replyMsg.data.attachments[0].id);
            preview.textContent =
              as && isImageName(as.name) ? "Image" : "Attachment";
          } else if (replyMsg?.data.embeds.length) {
            preview.textContent = "Embed";
          } else {
            const i = el("span", {
              style: { fontStyle: "italic", opacity: "0.6" },
            });
            i.textContent = "Click to see message";
            preview.appendChild(i);
          }
          bar.appendChild(preview);
          container.appendChild(bar);
        }

        const row = el("div", {
          class: `msg ${grouped ? "grouped" : "not-grouped"}`,
        });
        const left = el("div", { class: "msg-left" });
        if (grouped) {
          const ts = el("span", { class: "msg-timestamp-hover" });
          ts.textContent = formatShortTime(msg.created_at);
          left.appendChild(ts);
        } else {
          const img = el("img", {
            class: "msg-avatar",
            src: avatarUrl,
            crossorigin: "anonymous",
          });
          img.oncontextmenu = (e) => userContextMenu(e, user, msg);
          img.onerror = () => (img.src = getDefaultAvatar(msg.user_id ?? "0"));
          left.appendChild(img);
        }
        row.appendChild(left);

        const body = el("div", { class: "msg-body" });
        if (!grouped) {
          const hdr = el("div", { class: "msg-header" });
          const uname = el("span", {
            class: "msg-username",
            style: { color: user ? getAvatarColor(user.id) : "#f2f3f5" },
          });
          uname.textContent = user?.username ?? "Unknown User";
          hdr.appendChild(uname);
          if (user?.bot === 1) {
            const badge = el("span", { class: "bot-badge" });
            badge.textContent = "BOT";
            hdr.appendChild(badge);
          }
          const ts = el("span", { class: "msg-time" });
          ts.textContent = formatTimestamp(msg.created_at);
          hdr.appendChild(ts);
          body.appendChild(hdr);
        }

        if (msg.content) {
          const emojiOnly = isEmojiOnly(msg.content);
          const wrap = el("div", { class: "msg-content" });
          wrap.appendChild(renderMarkdown(msg.content, false, emojiOnly));
          body.appendChild(wrap);
        }

        if (msg.data.attachments.length)
          body.appendChild(renderAttachments(msg.data.attachments));
        if (msg.sticker_id) {
          const s = renderSticker(msg.sticker_id);
          if (s) body.appendChild(s);
        }
        msg.data.embeds.forEach((embed) => {
          body.appendChild(renderEmbed(embed));
        });
        if (msg.data.components.length) {
          const cWrap = el("div", {
            style: {
              display: "flex",
              flexDirection: "column",
              gap: "8px",
              marginTop: "8px",
            },
          });
          msg.data.components.forEach((comp) => {
            const r = renderComponent(comp);
            if (r) cWrap.appendChild(r);
          });
          body.appendChild(cWrap);
        }

        row.appendChild(body);
        container.appendChild(row);
      }

      container.appendChild(el("div", { class: "spacer" }));
    }

    renderHeader();
    renderMessages();
    renderFooter();
  </script>
</html>
